name: build-windows-exe

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows-exe:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run tests
        run: python -m tests.test_smoke

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build exe
        run: >
          pyinstaller --onefile --name PayDayPilot
          --add-data "app/static;app/static"
          run.py

      - uses: actions/upload-artifact@v4
        with:
          name: PayDayPilot
          path: dist/PayDayPilot.exe

      - name: Publish to "windows-latest" release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: windows-latest
          name: PayDay Pilot — Windows (latest)
          prerelease: true
          body: |
            Windows build of PayDay Pilot, rebuilt automatically from the
            latest source — always in sync with the Android build. Download
            `PayDayPilot.exe` below and double-click it; the dashboard opens
            in your browser. SmartScreen may warn because the exe isn't
            code-signed; click "More info → Run anyway". Fully offline —
            all data stays on your computer.
          files: dist/PayDayPilot.exe

      - name: Attach to versioned release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/PayDayPilot.exe
